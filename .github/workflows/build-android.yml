name: Build Android AAB (gratuit, hors quota EAS)

# Construit le fichier .aab du Play Store sur les serveurs GitHub (gratuits),
# via `eas build --local` => ne consomme PAS le quota de builds cloud EAS,
# et garde la meme cle de signature gere par EAS (telechargee via EXPO_TOKEN).
# Declenchement : bouton "Run workflow" dans l'onglet Actions de GitHub.

on:
  workflow_dispatch: {}
  # Se declenche aussi automatiquement quand on pousse un tag "build-*"
  # (ex: git tag build-16 && git push origin build-16) => permet de lancer
  # le build sans le bouton "Run workflow", sans manipuler de jeton.
  push:
    tags:
      - 'build-*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installer les dependances
        working-directory: mobile
        run: npm install

      - name: Construire l'AAB (EAS en local, sans quota cloud)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build --platform android --profile production --local --non-interactive --output "$GITHUB_WORKSPACE/mondevisminute.aab"

      - name: Recuperer l'AAB (artifact telechargeable)
        uses: actions/upload-artifact@v4
        with:
          name: mondevisminute-aab
          path: mondevisminute.aab
          if-no-files-found: error
